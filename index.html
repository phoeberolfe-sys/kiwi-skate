<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>KiwiSkate</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="KiwiSkate" />
  <meta name="theme-color" content="#f3f5f7" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- App Shell -->
  <div class="app-shell">

    <!-- ===== DASHBOARD ===== -->
    <section class="screen active" id="screen-dashboard">
      <div class="screen-scroll">
        <!-- All sections populated by JS (including hero header) -->
        <div id="dash-content"></div>
      </div>
    </section>

    <!-- ===== SKILLS ===== -->
    <section class="screen" id="screen-skills">
      <div class="screen-scroll">
        <div class="page-header">
          <h2 class="page-title">Skills</h2>
        </div>
        <!-- Summary card — populated by JS -->
        <div class="card skills-summary" id="skills-summary"></div>
        <!-- Search -->
        <div class="skills-search-wrap">
          <svg class="skills-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="skills-search" id="skills-search" placeholder="Search skills..." autocomplete="off" />
          <button class="skills-search-clear" id="skills-search-clear" type="button" aria-label="Clear search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <!-- Search results -->
        <div id="skills-search-results" style="display:none"></div>
        <!-- Working on it list — populated by JS, hidden when empty -->
        <div id="working-section"></div>
        <!-- Badge sections — populated by JS -->
        <div id="skills-list"></div>
        <!-- Custom skills — populated by JS -->
        <div id="custom-skills-section"></div>
      </div>
    </section>

    <!-- ===== WORKOUTS ===== -->
    <section class="screen" id="screen-workouts">
      <div class="screen-scroll">
        <div class="page-header">
          <h2 class="page-title">Workouts</h2>
          <button class="btn-new-workout" id="btn-new-workout">+ New</button>
        </div>

        <!-- Populated by JS -->
        <div id="workouts-list"></div>
      </div>
    </section>

  </div><!-- end app-shell -->

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-target="dashboard">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" data-target="skills">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <span class="nav-label">Skills</span>
    </button>
    <button class="nav-item" data-target="workouts">
      <div class="nav-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 5h6M9 14l2 2 4-4"/></svg>
      </div>
      <span class="nav-label">Workouts</span>
    </button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
